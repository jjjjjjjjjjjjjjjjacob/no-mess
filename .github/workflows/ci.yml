name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: tsc --noEmit
      - run: tsc -p packages/no-mess-client
      - run: tsc --noEmit -p packages/no-mess-cli

  test-root:
    name: Test (root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test

  test-sdk:
    name: Test (SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: packages/no-mess-client
      - run: bun run test
        working-directory: packages/no-mess-client

  test-gateway:
    name: Test (API Gateway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: packages/api-gateway
      - run: bun run test
        working-directory: packages/api-gateway

  build-sdk:
    name: Build SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: packages/no-mess-client
      - run: bun run build
        working-directory: packages/no-mess-client
      - name: Verify dist outputs
        run: |
          test -f packages/no-mess-client/dist/index.js
          test -f packages/no-mess-client/dist/index.d.ts
          test -f packages/no-mess-client/dist/react/index.js
          test -f packages/no-mess-client/dist/react/index.d.ts
