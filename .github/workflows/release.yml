name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  release:
    name: Release Packages
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AUTO_APPROVE_APP_ID }}
          private-key: ${{ secrets.AUTO_APPROVE_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      - name: Check for changesets
        id: changesets
        run: |
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          if [ "$COUNT" -eq 0 ]; then
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: bun run version
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Build packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          cd packages/no-mess-client && bun run build && cd ../..
          cd packages/no-mess-mcp && bun run build && cd ../..
          cd packages/no-mess-cli && bun run build && cd ../..

      - name: Publish to npm
        if: steps.changesets.outputs.has_changesets == 'true'
        run: bun run release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit version changes
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): version packages [skip ci]"

      - name: Push to main
        if: steps.changesets.outputs.has_changesets == 'true'
        run: git push origin main --follow-tags

      - name: Create GitHub Releases
        if: steps.changesets.outputs.has_changesets == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          for tag in $(git tag --points-at HEAD); do
            echo "Creating release for $tag..."
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              --verify-tag \
            || echo "Warning: release for $tag may already exist"
          done

      - name: Sync versions to dev
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git fetch origin dev
          git checkout dev
          git merge main -m "chore(release): sync versions from main [skip ci]" --no-edit
          git push origin dev
