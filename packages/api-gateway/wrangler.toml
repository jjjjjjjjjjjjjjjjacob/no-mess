name = "no-mess-api-gateway"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# Custom domain — configure DNS to point api.no-mess.xyz to Cloudflare
# routes = [
#   { pattern = "api.no-mess.xyz", custom_domain = true }
